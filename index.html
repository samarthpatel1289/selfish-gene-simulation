<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧬 Selfish Gene — 3D Simulation</title>

  <!-- Chart.js (UMD, loaded before the ES-module script below) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Three.js + OrbitControls via importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>

  <style>
    /* ─── Design tokens ──────────────────────────────────────── */
    :root {
      --bg-0: #080c17;
      --bg-1: #0f172a;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --text: #e6edf6;
      --text-dim: #94a3b8;
      --text-faint: #64748b;
      /* glass surfaces */
      --glass: rgba(30, 41, 59, .55);
      --glass-strong: rgba(30, 41, 59, .78);
      --hairline: rgba(148, 163, 184, .16);
      --hairline-lit: rgba(255, 255, 255, .06);
      --shadow: 0 10px 30px -12px rgba(0, 0, 0, .7);
      --shadow-sm: 0 4px 14px -8px rgba(0, 0, 0, .8);
    }

    /* ─── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(56, 189, 248, .10), transparent 60%),
        radial-gradient(1000px 700px at 100% 0%, rgba(129, 140, 248, .12), transparent 55%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      position: relative;
      background: linear-gradient(135deg, rgba(30,58,95,.85) 0%, rgba(30,27,75,.85) 50%, rgba(59,7,100,.85) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: .9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .4rem;
      border-bottom: 1px solid var(--hairline);
    }
    /* thin glowing accent line under the header */
    header::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
      background-size: 200% 100%;
      opacity: .8;
      animation: sheen 6s linear infinite;
    }
    @keyframes sheen { to { background-position: 200% 0; } }
    header h1 {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 800;
      letter-spacing: -.01em;
      background: linear-gradient(90deg, #fff, #cbd5e1);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .sub { font-size: .72rem; color: var(--text-dim); margin-top: .1rem; }
    #header-legend { font-size: .8rem; color: #cbd5e1; }

    /* ─── Simulation type tabs ───────────────────────────────── */
    .sim-tabs {
      display: flex;
      gap: .5rem;
      padding: .6rem 1rem;
      background: rgba(15, 23, 42, .5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--hairline);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sim-tab {
      padding: .38rem .95rem;
      border-radius: 99px;
      border: 1px solid var(--hairline);
      background: rgba(148, 163, 184, .05);
      color: var(--text-dim);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .18s ease;
    }
    .sim-tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #06121f;
      box-shadow: 0 0 0 1px rgba(56,189,248,.4), 0 6px 18px -6px rgba(56, 189, 248, .7);
    }
    .sim-tab:not(.active):hover {
      background: rgba(148, 163, 184, .12);
      color: var(--text);
      border-color: rgba(148,163,184,.3);
    }

    /* ─── Main app layout ────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 1fr 320px;
      height: calc(100dvh - 108px);
      min-height: 440px;
    }
    @media (max-width: 680px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: min(62vw, 320px) 1fr;
        height: auto;
        min-height: unset;
      }
    }

    /* ─── 3D canvas panel ────────────────────────────────────── */
    .canvas-wrap {
      position: relative;
      overflow: hidden;
      background: radial-gradient(120% 120% at 50% 20%, #101a30 0%, #0a0e1a 70%);
    }
    #three-canvas { display: block; width: 100%; height: 100%; }
    /* subtle vignette so creatures pop against the world */
    .canvas-wrap::after {
      content: "";
      position: absolute; inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 120px 10px rgba(0, 0, 0, .55);
    }

    /* HUD overlays */
    .hud {
      position: absolute;
      top: .7rem;
      background: var(--glass-strong);
      backdrop-filter: blur(10px) saturate(1.2);
      -webkit-backdrop-filter: blur(10px) saturate(1.2);
      border: 1px solid var(--hairline);
      border-radius: .6rem;
      padding: .34rem .7rem;
      font-size: .72rem;
      font-weight: 600;
      color: var(--text);
      pointer-events: none;
      white-space: nowrap;
      line-height: 1.4;
      box-shadow: var(--shadow-sm);
    }
    .hud-left  { left:  .7rem; }
    .hud-right { right: .7rem; text-align: right; }

    /* ─── Side panel ─────────────────────────────────────────── */
    .side {
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid var(--hairline);
      display: flex;
      flex-direction: column;
      gap: .95rem;
      padding: .95rem;
      overflow-y: auto;
    }
    @media (max-width: 680px) {
      .side { border-left: none; border-top: 1px solid var(--hairline); }
    }

    /* Section label */
    .slbl {
      font-size: .64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .11em;
      color: var(--text-faint);
      padding-bottom: .34rem;
      margin-bottom: .5rem;
      border-bottom: 1px solid var(--hairline);
    }

    /* Population count cards */
    .pop-row { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }
    .pop-card {
      position: relative;
      background: linear-gradient(180deg, var(--glass), rgba(15,23,42,.4));
      border: 1px solid var(--hairline);
      border-radius: .7rem;
      padding: .6rem .6rem;
      text-align: center;
      box-shadow: var(--shadow-sm), inset 0 1px 0 var(--hairline-lit);
      overflow: hidden;
    }
    .pop-card .num {
      font-size: 1.65rem;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 18px currentColor;
    }
    .pop-card .lbl { font-size: .66rem; color: var(--text-dim); margin-top: .2rem; }

    /* Chart */
    .chart-box {
      flex: 1;
      position: relative;
      min-height: 150px;
      background: linear-gradient(180deg, var(--glass), rgba(15,23,42,.35));
      border: 1px solid var(--hairline);
      border-radius: .7rem;
      padding: .5rem .4rem .3rem;
      box-shadow: inset 0 1px 0 var(--hairline-lit);
    }

    /* Controls */
    .ctrl { display: flex; flex-direction: column; gap: .55rem; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }
    .btn {
      padding: .55rem;
      border-radius: .6rem;
      border: 1px solid var(--hairline);
      background: rgba(148, 163, 184, .06);
      color: var(--text);
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .16s ease;
    }
    .btn:hover { border-color: var(--accent); background: rgba(56, 189, 248, .12); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #06121f;
      box-shadow: 0 8px 20px -8px rgba(56, 189, 248, .7);
    }
    .btn.primary:hover { filter: brightness(1.08); box-shadow: 0 10px 26px -8px rgba(56, 189, 248, .85); }

    /* Sliders */
    .sl-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .76rem;
    }
    .sl-row label { flex: 0 0 74px; color: var(--text-dim); font-size: .73rem; }
    .sl-row input[type=range] {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      height: 6px;
      background: rgba(148, 163, 184, .22);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    .sl-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0f2fe, var(--accent));
      border: 2px solid #0a1220;
      box-shadow: 0 0 10px rgba(56, 189, 248, .8);
      transition: transform .12s ease;
    }
    .sl-row input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    .sl-row input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0f2fe, var(--accent));
      border: 2px solid #0a1220;
      box-shadow: 0 0 10px rgba(56, 189, 248, .8);
    }
    .sl-row .val {
      min-width: 2.4rem;
      text-align: right;
      color: var(--accent);
      font-weight: 700;
      font-size: .75rem;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body>

<!-- ═══════════ HEADER ═══════════════════════════════════════ -->
<header>
  <div>
    <h1>🧬 The Selfish Gene</h1>
    <div class="sub">3D Game Theory Simulation · based on Richard Dawkins' book</div>
  </div>
  <div id="header-legend">🦅 Hawk &nbsp; 🕊️ Dove</div>
</header>

<!-- ═══════════ SIM TABS ═════════════════════════════════════ -->
<div class="sim-tabs">
  <button class="sim-tab active" data-sim="hd">🦅🕊️ Hawk vs Dove</button>
  <button class="sim-tab"        data-sim="bi">🏠⚔️ Bourgeois vs Intruder</button>
  <button class="sim-tab"        data-sim="bs">♀♂ Battle of the Sexes</button>
</div>

<!-- ═══════════ APP ══════════════════════════════════════════ -->
<div class="app">

  <!-- LEFT: 3D canvas -->
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="hud hud-left"  id="hud-phase">🌅 Fight Phase</div>
    <div class="hud hud-right" id="hud-round">Round 0</div>
  </div>

  <!-- RIGHT: side panel -->
  <div class="side">

    <!-- Live counts -->
    <div>
      <div class="slbl">Live Population</div>
      <div class="pop-row">
        <div class="pop-card">
          <div class="num" id="cnt-a" style="color:#ef4444">—</div>
          <div class="lbl" id="lbl-a">🦅 Hawks</div>
        </div>
        <div class="pop-card">
          <div class="num" id="cnt-b" style="color:#38bdf8">—</div>
          <div class="lbl" id="lbl-b">🕊️ Doves</div>
        </div>
      </div>
      <!-- Extra row shown only in Battle of the Sexes mode -->
      <div class="pop-row" id="pop-row-bs" style="display:none;margin-top:.45rem">
        <div class="pop-card">
          <div class="num" id="cnt-c" style="color:#34d399">—</div>
          <div class="lbl" id="lbl-c">💙 Faithful</div>
        </div>
        <div class="pop-card">
          <div class="num" id="cnt-d" style="color:#fb923c">—</div>
          <div class="lbl" id="lbl-d">🔥 Philanderer</div>
        </div>
      </div>
    </div>

    <!-- Population chart -->
    <div>
      <div class="slbl">Population Over Time</div>
      <div class="chart-box"><canvas id="pop-chart" role="img" aria-label="Population history chart."></canvas></div>
    </div>

    <!-- Controls -->
    <div class="ctrl">
      <div class="slbl">Controls</div>
      <div class="btn-row">
        <button class="btn primary" id="btn-play">▶ Play</button>
        <button class="btn"         id="btn-reset">↺ Reset</button>
      </div>

      <div class="sl-row">
        <label>⚡ Speed</label>
        <input type="range" id="sl-speed" min="1" max="6" step="1" value="2" />
        <span class="val" id="val-speed">2×</span>
      </div>

      <div class="slbl" style="margin-top:.2rem">Starting Population</div>
      <div class="sl-row">
        <label id="lbl-sl-a">🦅 Hawks</label>
        <input type="range" id="sl-init-a" min="2" max="100" step="1" value="50" />
        <span class="val" id="val-init-a">50</span>
      </div>
      <div class="sl-row">
        <label id="lbl-sl-b">🕊️ Doves</label>
        <input type="range" id="sl-init-b" min="2" max="100" step="1" value="50" />
        <span class="val" id="val-init-b">50</span>
      </div>

      <div class="slbl" style="margin-top:.2rem" id="payoff-label">Payoff Values</div>
      <div id="std-payoff-section">
      <div class="sl-row">
        <label>🏆 Win</label>
        <input type="range" id="sl-win"    min="1" max="10" step="1" value="4" />
        <span class="val"  id="val-win">4</span>
      </div>
      <div class="sl-row">
        <label>🤝 Draw</label>
        <input type="range" id="sl-draw"   min="0" max="8"  step="1" value="2" />
        <span class="val"  id="val-draw">2</span>
      </div>
      <div class="sl-row">
        <label>😔 Loss</label>
        <input type="range" id="sl-loss"   min="-4" max="2" step="1" value="0" />
        <span class="val"  id="val-loss">0</span>
      </div>
      <div class="sl-row">
        <label>🤕 Injury</label>
        <input type="range" id="sl-injury" min="-10" max="-1" step="1" value="-2" />
        <span class="val"  id="val-injury">-2</span>
      </div>
      </div><!-- /std-payoff-section -->
      <!-- Battle of the Sexes payoff parameters (shown only in BoS mode) -->
      <div id="bos-payoff-section" style="display:none">
      <div class="sl-row">
        <label>👶 Benefit B</label>
        <input type="range" id="sl-B" min="5" max="25" step="1" value="15" />
        <span class="val" id="val-B">15</span>
      </div>
      <div class="sl-row">
        <label>🍼 Rearing R</label>
        <input type="range" id="sl-R" min="10" max="40" step="1" value="20" />
        <span class="val" id="val-R">20</span>
      </div>
      <div class="sl-row">
        <label>💌 Courtship C</label>
        <input type="range" id="sl-C" min="0" max="10" step="1" value="3" />
        <span class="val" id="val-C">3</span>
      </div>
      <div class="sl-row">
        <label>🧬 Mutation</label>
        <input type="range" id="sl-mutation" min="0" max="10" step="0.1" value="1" />
        <span class="val" id="val-mutation">1.0%</span>
      </div>
      </div><!-- /bos-payoff-section -->
    </div>

  </div><!-- /side -->
</div><!-- /app -->

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT  (ES module — can use import/from)
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════════════════════════════
   STRATEGY CLASSES  (mirrors the Python structure in the repo)
   ═══════════════════════════════════════════════════════════════ */

class Payoff {
  constructor(win = 4, loss = 0, draw = 2, injury = -2) {
    this.win = win; this.loss = loss;
    this.draw = draw; this.injury = injury;
  }
}

class Hawk {
  static emoji    = '🦅';
  static label    = 'Hawks';
  static cssColor = '#ef4444';
  static hexColor = 0xef4444;
  is_hawk = true; is_dove = false; is_bourgeois = false; is_intruder = false;
  compete(other, payoff) {
    if (other.is_dove) return payoff.win;
    return (payoff.win + payoff.injury) / 2; // Hawk vs Hawk: risky fight
  }
}

class Dove {
  static emoji    = '🕊️';
  static label    = 'Doves';
  static cssColor = '#38bdf8';
  static hexColor = 0x38bdf8;
  is_hawk = false; is_dove = true; is_bourgeois = false; is_intruder = false;
  compete(other, payoff) {
    if (other.is_hawk) return payoff.loss;  // retreats from Hawk
    return payoff.draw;                     // shares with Dove
  }
}

class Bourgeois {
  static emoji    = '🏠';
  static label    = 'Bourgeois';
  static cssColor = '#22c55e';
  static hexColor = 0x22c55e;
  is_hawk = false; is_dove = false; is_bourgeois = true; is_intruder = false;
  compete(other, payoff, isAtHome = true) {
    return isAtHome ? payoff.win : payoff.loss; // owner wins, visitor retreats
  }
}

class Intruder {
  static emoji    = '⚔️';
  static label    = 'Intruders';
  static cssColor = '#f97316';
  static hexColor = 0xf97316;
  is_hawk = false; is_dove = false; is_bourgeois = false; is_intruder = true;
  compete(other, payoff) {
    if (other.is_bourgeois) return payoff.loss; // Bourgeois home-defender wins
    return (payoff.win + payoff.injury) / 2;    // Intruder vs Intruder: costly fight
  }
}

/* ── Battle of the Sexes strategy classes ─────────────────────── */

class CoyFemale {
  static emoji    = '💜';
  static label    = 'Coy';
  static cssColor = '#a78bfa';
  static hexColor = 0xa78bfa;
  isFemale = true; isMale = false;
  isCoy = true; isFast = false; isFaithful = false; isPhilanderer = false;
}

class FastFemale {
  static emoji    = '🌸';
  static label    = 'Fast';
  static cssColor = '#f472b6';
  static hexColor = 0xf472b6;
  isFemale = true; isMale = false;
  isCoy = false; isFast = true; isFaithful = false; isPhilanderer = false;
}

class FaithfulMale {
  static emoji    = '💙';
  static label    = 'Faithful';
  static cssColor = '#34d399';
  static hexColor = 0x34d399;
  isFemale = false; isMale = true;
  isCoy = false; isFast = false; isFaithful = true; isPhilanderer = false;
}

class PhilandererMale {
  static emoji    = '🔥';
  static label    = 'Philanderer';
  static cssColor = '#fb923c';
  static hexColor = 0xfb923c;
  isFemale = false; isMale = true;
  isCoy = false; isFast = false; isFaithful = false; isPhilanderer = true;
}

class BattlePayoff {
  constructor(B = 15, R = 20, C = 3) { this.B = B; this.R = R; this.C = C; }
  /** Return [femaleGain, maleGain] for one encounter. */
  encounter(female, male) {
    if (female.isCoy  && male.isFaithful)    { const v = this.B - this.R/2 - this.C; return [v, v]; }
    if (female.isCoy  && male.isPhilanderer) { return [0, 0]; }
    if (female.isFast && male.isFaithful)    { const v = this.B - this.R/2; return [v, v]; }
    if (female.isFast && male.isPhilanderer) { return [this.B - this.R, this.B]; }
    throw new Error(`Unknown pairing: ${female.constructor.name} × ${male.constructor.name}`);
  }
}

/* ═══════════════════════════════════════════════════════════════
   THREE.JS SCENE SETUP
   ═══════════════════════════════════════════════════════════════ */

const wrap     = document.getElementById('canvas-wrap');
const canvas3d = document.getElementById('three-canvas');

const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
// Gentle fog fades distant creatures into the sky for depth.
scene.fog = new THREE.Fog(0x0d1117, 24, 46);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
camera.position.set(0, 16, 11);
camera.lookAt(0, 0, 0);

const orbitCtrl = new OrbitControls(camera, renderer.domElement);
orbitCtrl.enableDamping = true;
orbitCtrl.dampingFactor = 0.06;
orbitCtrl.minDistance   = 6;
orbitCtrl.maxDistance   = 35;
orbitCtrl.maxPolarAngle = Math.PI / 2.05;

// Lighting — hemisphere fill + warm key + cool rim for shape on the 3D bodies
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x2e4a22, 0.65);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff2d6, 1.35);
sun.position.set(9, 16, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
sun.shadow.camera.top = 14;   sun.shadow.camera.bottom = -14;
sun.shadow.camera.near = 1;   sun.shadow.camera.far = 48;
sun.shadow.bias = -0.0004;
sun.shadow.radius = 4;
scene.add(sun);

const rim = new THREE.DirectionalLight(0x8ab4ff, 0.5);
rim.position.set(-10, 8, -9);
scene.add(rim);

// Ground plane — soft radial-vignette texture painted on a canvas for subtle variation
function makeGroundTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const g = c.getContext('2d');

/* ═══════════════════════════════════════════════════════════════
   AGENT CLASS  — one living creature in the 3D world
   ═══════════════════════════════════════════════════════════════ */

class Agent {
  constructor(StrategyClass) {
    this.Class    = StrategyClass;
    this.strategy = new StrategyClass();
    this.energy   = 2;      // resource energy accumulated
    this.age      = 0;      // rounds survived
    this.alive    = true;
    this.homeIdx  = -1;     // territory index (Bourgeois only)

    // ── 3D body: a rounded, glossy blob tinted to the strategy colour ──
    this.root  = new THREE.Group();
    this.inner = new THREE.Group();          // holds body + face; bob/hop/squash live here
    this.root.add(this.inner);

    const bodyMat = new THREE.MeshStandardMaterial({
      color: StrategyClass.hexColor,
      emissive: StrategyClass.hexColor,
      emissiveIntensity: 0.18,
      roughness: 0.4,
      metalness: 0.05,
    });
    this.body = new THREE.Mesh(BODY_GEO, bodyMat);
    this.body.position.y = 0.55;             // rest the sphere on the ground
    this.body.castShadow = true;
    this.body.receiveShadow = true;
    this.inner.add(this.body);

    // Emoji billboard "face" floating just above the body — keeps each creature recognizable
    const faceMat = new THREE.SpriteMaterial({ map: emojiTexture(StrategyClass.emoji), transparent: true, depthWrite: false });
    this.face = new THREE.Sprite(faceMat);
    this.face.scale.set(1.05, 1.05, 1);
    this.face.position.y = 1.2;
    this.inner.add(this.face);

    // Animation state
    this._phase   = Math.random() * TWO_PI;  // desync idle bob between creatures
    this._hop     = Math.random() * TWO_PI;
    this._scale   = 1;                        // current squash/stretch scalar
    this._scaleTo = 1;                        // eased target

    const a = Math.random() * TWO_PI;
    const r = Math.random() * 2.5;
    this.root.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
    this._target = this.root.position.clone();

    scene.add(this.root);
  }

  /* Smooth movement + life animation — call every frame */
  update(dt, t) {
    const p = this.root.position;
    const dx = this._target.x - p.x;
    const dz = this._target.z - p.z;
    const dist = Math.hypot(dx, dz);
    const lerpSpeed = Math.min(1, 3.5 * dt);
    p.x += dx * lerpSpeed;
    p.z += dz * lerpSpeed;

    const moving = dist > 0.12;

    // Face the direction of travel + gentle lean into the motion
    if (moving) {
      this.root.rotation.y = Math.atan2(dx, dz);
      this._hop += dt * 12;
    } else {
      this._hop += dt * 2.5;
    }

    // Idle bob + travel hop
    const bob = Math.sin(t * 2 + this._phase) * 0.05;
    const hop = moving ? Math.abs(Math.sin(this._hop)) * 0.35 : 0;
    this.inner.position.y = bob + hop;
    this.inner.rotation.z = moving ? -Math.min(dist, 1) * 0.18 : 0;

    // Squash & stretch — ease current scale toward target, then relax target to 1
    this._scale   += (this._scaleTo - this._scale) * Math.min(1, 10 * dt);
    this._scaleTo += (1 - this._scaleTo) * Math.min(1, 4 * dt);
    const s  = this._scale;
    // Volume-preserving-ish: taller when puffed, flatter when squished, plus a hop stretch
    const sy = s * (1 + hop * 0.25);
    const sxz = s <= 1 ? s : 1 + (s - 1) * 0.6;
    this.inner.scale.set(sxz, sy, sxz);
  }

  moveTo(x, z) { this._target.set(x, 0, z); }

  wander(radius = 4.5) {
    const a = Math.random() * TWO_PI;
    const r = Math.random() * radius + 0.5;
    this.moveTo(Math.cos(a) * r, Math.sin(a) * r);
  }

  /* Scale pulse — visual feedback for fight outcome (winners puff, losers squish) */
  pulse(upScale = 1.8) {
    this._scaleTo = upScale * 0.72;          // map old sprite-scale range to body scale
  }

  dispose() {
    scene.remove(this.root);
    this.body.material.dispose();
    this.face.material.dispose();
    this.alive = false;
  }
}

let payoff   = new Payoff();

// Game-balance constants — easy to tune in one place
const MIN_ENERGY_THRESHOLD   = -4;  // energy below this kills an agent
const MAX_AGE                = 9;   // rounds before old-age death is possible
const OLD_AGE_DEATH_PROB     = 0.3; // probability of dying each round past MAX_AGE
const MAX_DELTA_TIME         = 0.1; // frame-time cap (seconds) to avoid physics jumps

// Phase cycle: fight → roam → mate → cull → (back to fight)
const PHASES    = ['fight', 'roam', 'mate', 'cull'];
const PHASE_DUR = { fight: 2.2, roam: 0.9, mate: 2.0, cull: 0.6 };
const STANDARD_PHASE_HUD = {

  mate:  '🌇 Mate Phase — offspring are born',

};
const BOS_PHASE_HUD = {

  roam:  '☀️  Roaming',
  mate:  '💕 Mating — offspring are conceived',
  cull:  '🍼 Rearing — the next generation is selected',
};
const PHASE_SKY = {

  roam:  new THREE.Color(0x0f2a4a),

// History for chart — retains every round of the run (no rolling window).
const histA = [], histB = [];
// Dawkins' Battle of the Sexes mixed-strategy equilibrium, expressed in chart percentages
// for the 0–100 y-axis used by the UI chart.
const BOS_EQUILIBRIUM = {
  coy: 83,       // chart percentages, matching the y-axis scale of 0–100
  faithful: 62.5,
};
const PRIMARY_DATASET_COUNT = 2;
const REPRODUCTION_MULTIPLIER = 2;
const MIN_WEIGHT_OFFSET = 1;
const MAX_INVERSE_WEIGHT = 1e6;

function getPhaseHudText(currentPhase) {
  return (simType === 'bs' ? BOS_PHASE_HUD : STANDARD_PHASE_HUD)[currentPhase] ?? STANDARD_PHASE_HUD.fight;
}

function getPopulationTargets() {
  const targetA = +document.getElementById('sl-init-a').value;
  const targetB = +document.getElementById('sl-init-b').value;
  return {
    a: targetA,
    b: targetB,
    // Allow each starting slot to reproduce once before the cap trims the pool back down.
    total: (targetA + targetB) * REPRODUCTION_MULTIPLIER,
  };
}

function buildWeightedPool(pool) {
  const viable = [];
  let floor = Infinity;
  for (const agent of pool) {
    if (agent.energy < MIN_ENERGY_THRESHOLD) continue;
    viable.push(agent);
    floor = Math.min(floor, agent.energy);
  }
  if (!viable.length) return [];
  // Shift energies onto a strictly positive scale so roulette-wheel sampling
  // stays proportional even when one sex's payoffs dip below zero.
  return viable.map(agent => ({
    agent,
    weight: Math.max(0, agent.energy - floor) + MIN_WEIGHT_OFFSET,
  }));
}

function pickWeightedAgent(weightedPool) {
  if (!weightedPool.length) return null;
  const totalWeight = weightedPool.reduce((sum, entry) => sum + entry.weight, 0);
  let threshold = Math.random() * totalWeight;
  for (const entry of weightedPool) {
    threshold -= entry.weight;
    if (threshold <= 0) return entry.agent;
  }
  // Defensive fallback for floating-point edge cases.
  return weightedPool[weightedPool.length - 1]?.agent ?? null;
}

function buildInverseWeightedPool(pool) {
  // Invert the survival weights so weaker agents are more likely to be trimmed
  // when a sex grows beyond its cap, without reverting to a hard lowest-score cull.
  return buildWeightedPool(pool).map(entry => ({
    agent: entry.agent,
    weight: Math.min(1 / Math.max(entry.weight, Number.EPSILON), MAX_INVERSE_WEIGHT),
  }));
}

function spawnChild(parent, ChildClass) {
  const child = new Agent(ChildClass);
  child.energy = 1;
  child.root.position.copy(parent.root.position);
  child._target.copy(parent.root.position);
  child.pulse(2.5);
  spawnBirthBurst(parent.root.position);
  return child;
}

/* ─── init / reset ──────────────────────────────────────────── */

function initAgents(countA, countB) {
  agents.forEach(a => a.dispose());
  agents = [];

  if (simType === 'bs') {
    // Two independent populations: females (Coy/Fast) and males (Faithful/Philanderer)
    // countA = total females, countB = total males; start each sex 50/50
    const nCoy      = Math.ceil(countA / 2);
    const nFast     = countA - nCoy;
    const nFaithful = Math.ceil(countB / 2);
    const nPhil     = countB - nFaithful;
    for (let i = 0; i < nCoy;      i++) agents.push(new Agent(CoyFemale));
    for (let i = 0; i < nFast;     i++) agents.push(new Agent(FastFemale));
    for (let i = 0; i < nFaithful; i++) agents.push(new Agent(FaithfulMale));
    for (let i = 0; i < nPhil;     i++) agents.push(new Agent(PhilandererMale));
  } else {
    const ClassA = simType === 'hd' ? Hawk : Bourgeois;
    const ClassB = simType === 'hd' ? Dove : Intruder;
    for (let i = 0; i < countA; i++) agents.push(new Agent(ClassA));
    for (let i = 0; i < countB; i++) agents.push(new Agent(ClassB));
  }

  round = 0; phase = 'fight'; phaseTimer = 0;
  histA.length = 0; histB.length = 0;

  territories.forEach(t => {
    t.ownerIdx = -1;
    paintTerritory(t, 0x78350f);
  });

  if (simType === 'bi') _assignBourgeoisHomes();
  _refreshUI();
  _refreshChart();
}

function _assignBourgeoisHomes() {
  const bAgents = agents.filter(a => a.strategy.is_bourgeois);
  territories.forEach((t, i) => {
    if (i < bAgents.length) {
      bAgents[i].homeIdx = i;
      t.ownerIdx = i;
      paintTerritory(t, 0x15803d, 0x073d1a); // green = owned
    }
  });
}

/* ─── Fight Phase ───────────────────────────────────────────── */

function runFightPhase() {
  // Reset territory colours
  territories.forEach(t => paintTerritory(t, 0x78350f));

  // Shuffle agents
  const shuffled = [...agents].sort(() => Math.random() - 0.5);

  // Assign each agent to a territory (more agents than territories → contests)
  const tBuckets = territories.map(() => []);
  shuffled.forEach((agent, i) => {
    const tIdx = i % territories.length;
    tBuckets[tIdx].push(agent);
    const t = territories[tIdx];
    const jx = (Math.random() - 0.5) * 0.7;
    const jz = (Math.random() - 0.5) * 0.7;
    agent.moveTo(t.x + jx, t.z + jz);
  });

  // Resolve each territory
  tBuckets.forEach((bucket, tIdx) => {
    if (bucket.length === 0) return;

    if (bucket.length === 1) {
      // Uncontested — sole agent earns the resource
      bucket[0].energy += payoff.win;
      paintTerritory(territories[tIdx], 0xfbbf24, 0x6b4708); // gold = claimed
      bucket[0].pulse(2.0);
    } else {
      paintTerritory(territories[tIdx], 0xef4444, 0x5a1010); // red = contested
      // Pair up agents and fight
      for (let k = 0; k + 1 < bucket.length; k += 2) {
        const a = bucket[k], b = bucket[k + 1];
        let gainA, gainB;

        if (simType === 'bi') {
          const aHome = a.homeIdx === tIdx;
          const bHome = b.homeIdx === tIdx;
          gainA = a.strategy.compete(b.strategy, payoff, aHome);
          gainB = b.strategy.compete(a.strategy, payoff, bHome);
        } else {
          gainA = a.strategy.compete(b.strategy, payoff);
          gainB = b.strategy.compete(a.strategy, payoff);
        }

        a.energy += gainA;
        b.energy += gainB;
        // Visual pulse: winner grows, loser shrinks briefly
        if (gainA > gainB) { a.pulse(2.2); b.pulse(0.7, 250); }
        else if (gainB > gainA) { b.pulse(2.2); a.pulse(0.7, 250); }
        else { a.pulse(1.6); b.pulse(1.6); }
      }
      // Odd agent out at contested territory gets nothing
    }
  });
}

/* ─── Battle of the Sexes Fight Phase ──────────────────────── */

let battleOfSexesMutationRate = 0.01;

function runBosFightPhase() {
  const females = agents.filter(a => a.strategy.isFemale).sort(() => Math.random() - 0.5);
  const males   = agents.filter(a => a.strategy.isMale  ).sort(() => Math.random() - 0.5);

  // Position females on left, males on right for visual distinction
  females.forEach((f, i) => {
    const angle = (i / females.length) * Math.PI - Math.PI / 2;
    f.moveTo(-3.5 + (Math.random() - 0.5) * 1.2, Math.sin(angle) * 3.5 + (Math.random() - 0.5) * 0.6);
  });
  males.forEach((m, i) => {
    const angle = (i / males.length) * Math.PI - Math.PI / 2;
    m.moveTo(3.5 + (Math.random() - 0.5) * 1.2, Math.sin(angle) * 3.5 + (Math.random() - 0.5) * 0.6);
  });

  const pairs = Math.min(females.length, males.length);
  for (let i = 0; i < pairs; i++) {
    const f = females[i], m = males[i];
    const [gF, gM] = bosPayoff.encounter(f.strategy, m.strategy);
    f.energy += gF;
    m.energy += gM;
    if (gF > 0) f.pulse(2.0); else if (gF < 0) f.pulse(0.7, 250); else f.pulse(1.2);
    if (gM > 0) m.pulse(2.0); else if (gM < 0) m.pulse(0.7, 250); else m.pulse(1.2);
  }
}

/* ─── Mate Phase ────────────────────────────────────────────── */

const MATE_THRESHOLD = 3;

function runMatePhase() {
  const eligible = agents.filter(a => a.energy >= MATE_THRESHOLD);
  const maxPopulation = getPopulationTargets().total;

  // Move eligible agents to mate zone (center)
  eligible.forEach(a => {
    const angle = Math.random() * TWO_PI;
    a.moveTo(Math.cos(angle) * 1.4, Math.sin(angle) * 1.4);
  });

  // Produce one offspring per two eligible parents
  const newborns = [];
  for (let i = 0; i + 1 < eligible.length; i += 2) {
    if (agents.length + newborns.length >= maxPopulation) break;
    const parent = eligible[i];
    newborns.push(spawnChild(parent, parent.Class));
  }
  agents.push(...newborns);

  // Send everyone else to wander
  agents.filter(a => !eligible.includes(a)).forEach(a => a.wander());
}

/* ─── Battle of the Sexes Mate Phase (per-sex replicator) ───── */

function runBosMatePhase() {
  const females = agents.filter(a => a.strategy.isFemale);
  const males   = agents.filter(a => a.strategy.isMale);
  const eligF = females.filter(a => a.energy >= MATE_THRESHOLD);
  const eligM = males.filter(a => a.energy >= MATE_THRESHOLD);

  // Move eligible to mate zone
  [...eligF, ...eligM].forEach(a => {
    const angle = Math.random() * TWO_PI;
    a.moveTo(Math.cos(angle) * 1.4, Math.sin(angle) * 1.4);
  });

  const newborns = [];
  const femalePool = buildWeightedPool(eligF);
  const malePool   = buildWeightedPool(eligM);
  const femaleBirths = Math.floor(femalePool.length / 2);
  const maleBirths   = Math.floor(malePool.length / 2);

  // Sample with replacement so higher-fitness parents can contribute multiple offspring.
  for (let births = 0; births < femaleBirths; births++) {
    const parent = pickWeightedAgent(femalePool);
    if (!parent) break;
    let ChildClass = parent.Class;
    if (Math.random() < battleOfSexesMutationRate) {
      ChildClass = parent.strategy.isCoy ? FastFemale : CoyFemale;
    }
    newborns.push(spawnChild(parent, ChildClass));
  }

  for (let births = 0; births < maleBirths; births++) {
    const parent = pickWeightedAgent(malePool);
    if (!parent) break;
    let ChildClass = parent.Class;
    if (Math.random() < battleOfSexesMutationRate) {
      ChildClass = parent.strategy.isFaithful ? PhilandererMale : FaithfulMale;
    }
    newborns.push(spawnChild(parent, ChildClass));
  }

  agents.push(...newborns);

  // Send non-eligible to wander
  const eligible = new Set([...eligF, ...eligM]);
  agents.filter(a => !eligible.has(a)).forEach(a => a.wander());
}

/* ─── Cull Phase ────────────────────────────────────────────── */

function runCullPhase() {
  const dead = [];
  agents.forEach(a => {
    a.age++;
    const tooWeak = a.energy < MIN_ENERGY_THRESHOLD;
    const oldAge  = a.age > MAX_AGE && Math.random() < OLD_AGE_DEATH_PROB;
    if (tooWeak || oldAge) dead.push(a);
  });

  const deadSet = new Set(dead);
  const alive = agents.filter(a => !deadSet.has(a));
  const { a: femaleTarget, b: maleTarget, total } = getPopulationTargets();

  if (simType === 'bs') {
    const females = alive.filter(agent => agent.strategy.isFemale);
    const males   = alive.filter(agent => agent.strategy.isMale);
    const femaleSurvivors = new Set(females);
    const maleSurvivors   = new Set(males);

    // Trim one sex back to its population cap by making weaker agents
    // more likely to be removed, rather than deleting the lowest scorers outright.
    function trimToTarget(pool, survivors, target) {
      const weightedPool = buildInverseWeightedPool(pool);
      let overflow = pool.length - target;
      while (overflow > 0 && weightedPool.length > 0) {
        const removed = pickWeightedAgent(weightedPool);
        const idx = weightedPool.findIndex(entry => entry.agent === removed);
        if (!removed || idx === -1) break;
        if (!survivors.has(removed)) {
          weightedPool.splice(idx, 1);
          continue;
        }
        survivors.delete(removed);
        weightedPool.splice(idx, 1);
        overflow--;
      }
    }

    trimToTarget(females, femaleSurvivors, femaleTarget * REPRODUCTION_MULTIPLIER);
    trimToTarget(males, maleSurvivors, maleTarget * REPRODUCTION_MULTIPLIER);

    alive.forEach(agent => {
      if (agent.strategy.isFemale && !femaleSurvivors.has(agent)) dead.push(agent);
      if (agent.strategy.isMale && !maleSurvivors.has(agent)) dead.push(agent);
    });
  } else if (alive.length > total) {
    alive.sort((a, b) => a.energy - b.energy);
    const excess = alive.length - total;
    for (let i = 0; i < excess; i++) dead.push(alive[i]);
  }

  dead.forEach(a => { a.dispose(); agents = agents.filter(x => x !== a); });

  // After culling, scatter everyone
  agents.forEach(a => a.wander(5));
}

/* ─── Advance one phase ─────────────────────────────────────── */

function advancePhase() {
  if      (phase === 'fight') {
    if (simType === 'bs') runBosFightPhase(); else runFightPhase();
    phase = 'roam';
    agents.forEach(a => a.wander());
  }
  else if (phase === 'roam')  {
    phase = 'mate';
    if (simType === 'bs') runBosMatePhase(); else runMatePhase();
  }
  else if (phase === 'mate')  { phase = 'cull'; }
  else {
    runCullPhase();
    round++;
    _recordHistory();
    _refreshChart();
    phase = 'fight';
  }

  phaseTimer = 0;
  _refreshUI();
  scene.background.set(PHASE_SKY[phase]);
}

/* ─── History & chart ───────────────────────────────────────── */

function _recordHistory() {
  if (simType === 'bs') {
    const females = agents.filter(a => a.strategy.isFemale);
    const males   = agents.filter(a => a.strategy.isMale);
    const pctCoy      = females.length > 0
      ? females.filter(a => a.strategy.isCoy).length      / females.length * 100 : 0;
    const pctFaithful = males.length   > 0
      ? males.filter(a => a.strategy.isFaithful).length   / males.length   * 100 : 0;
    histA.push(Math.round(pctCoy));
    histB.push(Math.round(pctFaithful));
  } else {
    const ClassA = simType === 'hd' ? Hawk : Bourgeois;
    const ClassB = simType === 'hd' ? Dove : Intruder;
    histA.push(agents.filter(a => a.strategy instanceof ClassA).length);
    histB.push(agents.filter(a => a.strategy instanceof ClassB).length);
  }
  // Keep the entire run's history so the chart shows the whole simulation,
  // not a rolling window. Chart.js decimation keeps long runs performant.
}

const popChart = new Chart(document.getElementById('pop-chart'), {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: '🦅 Hawks',   data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,.14)',
        borderWidth: 2, tension: 0.2, pointRadius: 0, fill: true },
      { label: '🕊️ Doves',  data: [], borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,.14)',
        borderWidth: 2, tension: 0.2, pointRadius: 0, fill: true },
      { label: `Coy equilibrium (${BOS_EQUILIBRIUM.coy}%)`, data: [], borderColor: 'rgba(167,139,250,.28)', backgroundColor: 'transparent',
        borderWidth: 1, borderDash: [6, 6], tension: 0, pointRadius: 0, fill: false },
      { label: `Faithful equilibrium (${BOS_EQUILIBRIUM.faithful}%)`, data: [], borderColor: 'rgba(52,211,153,.28)', backgroundColor: 'transparent',
        borderWidth: 1, borderDash: [6, 6], tension: 0, pointRadius: 0, fill: false },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    // Retaining the full run means many points; normalized + decimation keep it smooth.
    normalized: true,
    parsing: false,
    plugins: {
      legend: {
        labels: {
          color: '#cbd5e1',
          font: { size: 10 },
          boxWidth: 10,
          usePointStyle: true,
          // Keep the legend focused on the live populations; the dashed equilibrium guides stay unlabeled there.
          filter: item => item.datasetIndex < PRIMARY_DATASET_COUNT,
        }
      },
      // Largest-Triangle-Three-Buckets keeps the curve's shape while capping drawn points,
      // so hundreds of rounds still render fluidly across the fixed chart width.
      decimation: { enabled: true, algorithm: 'lttb', samples: 220 },
    },
    scales: {
      x: { type: 'linear', display: false, bounds: 'data' },
      y: { beginAtZero: true, ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: 'rgba(148,163,184,.08)' } }
    }
  }
});

function _refreshChart() {
  if (simType === 'bs') {
    popChart.data.datasets[0].label           = '💜 % Coy females';
    popChart.data.datasets[1].label           = '💙 % Faithful males';
    popChart.data.datasets[0].borderColor     = '#a78bfa';
    popChart.data.datasets[1].borderColor     = '#34d399';
    popChart.data.datasets[0].backgroundColor = '#a78bfa20';
    popChart.data.datasets[1].backgroundColor = '#34d39920';
    popChart.options.scales.y.max = 100;
    // Dawkins' mixed-strategy equilibrium targets: ~83% Coy females and 62.5% Faithful males.
    popChart.data.datasets[2].data = histA.map((_, i) => ({ x: i + 1, y: BOS_EQUILIBRIUM.coy }));
    popChart.data.datasets[3].data = histA.map((_, i) => ({ x: i + 1, y: BOS_EQUILIBRIUM.faithful }));
  } else {
    const ClassA = simType === 'hd' ? Hawk : Bourgeois;
    const ClassB = simType === 'hd' ? Dove : Intruder;
    popChart.data.datasets[0].label           = ClassA.emoji + ' ' + ClassA.label;
    popChart.data.datasets[1].label           = ClassB.emoji + ' ' + ClassB.label;
    popChart.data.datasets[0].borderColor     = ClassA.cssColor;
    popChart.data.datasets[1].borderColor     = ClassB.cssColor;
    popChart.data.datasets[0].backgroundColor = ClassA.cssColor + '20';
    popChart.data.datasets[1].backgroundColor = ClassB.cssColor + '20';
    popChart.options.scales.y.max = undefined;
    popChart.data.datasets[2].data = [];
    popChart.data.datasets[3].data = [];
  }
  // parsing:false → supply explicit {x, y} points so decimation can down-sample long runs.
  popChart.data.labels   = histA.map((_, i) => i + 1);
  popChart.data.datasets[0].data = histA.map((v, i) => ({ x: i + 1, y: v }));
  popChart.data.datasets[1].data = histB.map((v, i) => ({ x: i + 1, y: v }));
  popChart.update('none');
}

/* ─── UI refresh ────────────────────────────────────────────── */

function _refreshUI() {
  if (simType === 'bs') {
    const females  = agents.filter(a => a.strategy.isFemale);
    const males    = agents.filter(a => a.strategy.isMale);
    const nCoy     = females.filter(a => a.strategy.isCoy).length;
    const nFast    = females.filter(a => a.strategy.isFast).length;
    const nFaith   = males.filter(a => a.strategy.isFaithful).length;
    const nPhil    = males.filter(a => a.strategy.isPhilanderer).length;

    document.getElementById('cnt-a').textContent = nCoy;
    document.getElementById('cnt-b').textContent = nFast;
    document.getElementById('cnt-c').textContent = nFaith;
    document.getElementById('cnt-d').textContent = nPhil;
    document.getElementById('lbl-a').textContent = '💜 Coy';
    document.getElementById('lbl-b').textContent = '🌸 Fast';
    document.getElementById('lbl-c').textContent = '💙 Faithful';
    document.getElementById('lbl-d').textContent = '🔥 Philanderer';
    document.getElementById('cnt-a').style.color = '#a78bfa';
    document.getElementById('cnt-b').style.color = '#f472b6';
    document.getElementById('header-legend').textContent =
      '💜 Coy  🌸 Fast  💙 Faithful  🔥 Philanderer';
  } else {
    const ClassA = simType === 'hd' ? Hawk : Bourgeois;
    const ClassB = simType === 'hd' ? Dove : Intruder;
    const cntA   = agents.filter(a => a.strategy instanceof ClassA).length;
    const cntB   = agents.filter(a => a.strategy instanceof ClassB).length;

    document.getElementById('cnt-a').textContent = cntA;
    document.getElementById('cnt-b').textContent = cntB;
    document.getElementById('lbl-a').textContent = ClassA.emoji + ' ' + ClassA.label;
    document.getElementById('lbl-b').textContent = ClassB.emoji + ' ' + ClassB.label;
    document.getElementById('cnt-a').style.color = ClassA.cssColor;
    document.getElementById('cnt-b').style.color = ClassB.cssColor;
    document.getElementById('header-legend').textContent =
      ClassA.emoji + ' ' + ClassA.label + '  ' + ClassB.emoji + ' ' + ClassB.label;
  }
  document.getElementById('pop-chart').setAttribute(
    'aria-label',
    simType === 'bs'
      ? 'Population history chart. Faint dashed lines mark the 83 percent Coy and 62.5 percent Faithful theoretical equilibria.'
      : 'Population history chart for the active simulation.'
  );
  document.getElementById('hud-phase').textContent = getPhaseHudText(phase);
  document.getElementById('hud-round').textContent = 'Round ' + round;
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════════════════ */

const clock = new THREE.Clock();
let animTime = 0;   // continuous clock for idle animation (runs even when paused)

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), MAX_DELTA_TIME); // cap delta to avoid jumps
  animTime += dt;

  // Update all agent positions + life animation each frame
  agents.forEach(a => a.update(dt, animTime));

  // Drifting atmosphere motes — rise and wrap around
  const mp = motes.geometry.getAttribute('position');
  for (let i = 0; i < MOTE_COUNT; i++) {
    let y = mp.getY(i) + moteVel[i] * dt;
    if (y > 9) { y = 0; mp.setX(i, (Math.random() - 0.5) * 22); mp.setZ(i, (Math.random() - 0.5) * 22); }
    mp.setY(i, y);
  }
  mp.needsUpdate = true;
  motes.rotation.y += dt * 0.02;

  updateBirthBursts(dt);

  // Mate zone breathes; glows brighter during the mate phase
  const mateActive = phase === 'mate';
  const pulseAmt = 0.5 + 0.5 * Math.sin(animTime * (mateActive ? 4 : 1.6));
  mateRing.material.opacity = (mateActive ? 0.55 : 0.3) + pulseAmt * (mateActive ? 0.4 : 0.15);
  mateHalo.material.opacity = (mateActive ? 0.18 : 0.08) + pulseAmt * 0.06;
  const haloScale = 1 + pulseAmt * (mateActive ? 0.12 : 0.05);
  mateHalo.scale.set(haloScale, haloScale, 1);
  mateZoneMesh.material.emissiveIntensity = mateActive ? 0.35 + pulseAmt * 0.35 : 0.2;

  // Advance simulation when running
  if (running) {
    phaseTimer += dt * simSpeed;
    if (phaseTimer >= PHASE_DUR[phase]) advancePhase();

    // Smoothly lerp sky colour toward target
    scene.background.lerp(PHASE_SKY[phase], dt * 1.5);
    if (scene.fog) scene.fog.color.copy(scene.background);
  }

  orbitCtrl.update();

  // Resize renderer to match container (handles window resize & mobile)
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (renderer.domElement.width  !== Math.round(w * renderer.getPixelRatio()) ||
      renderer.domElement.height !== Math.round(h * renderer.getPixelRatio())) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  renderer.render(scene, camera);
}

animate();

/* ═══════════════════════════════════════════════════════════════
   UI EVENT LISTENERS
   ═══════════════════════════════════════════════════════════════ */

// Play / Pause
const btnPlay = document.getElementById('btn-play');
btnPlay.addEventListener('click', () => {
  running = !running;
  btnPlay.textContent = running ? '⏸ Pause' : '▶ Play';
  btnPlay.className   = running ? 'btn' : 'btn primary';
  if (running) clock.getDelta(); // flush accumulated delta
});

// Reset
document.getElementById('btn-reset').addEventListener('click', () => {
  running = false;
  btnPlay.textContent = '▶ Play';
  btnPlay.className   = 'btn primary';
  initAgents(
    +document.getElementById('sl-init-a').value,
    +document.getElementById('sl-init-b').value
  );
  scene.background.set(PHASE_SKY.fight);
});

// Speed slider
document.getElementById('sl-speed').addEventListener('input', e => {
  simSpeed = +e.target.value;
  document.getElementById('val-speed').textContent = simSpeed + '×';
});

// Population sliders (just update label, reset applies the value)
['a', 'b'].forEach(s => {
  document.getElementById('sl-init-' + s).addEventListener('input', e => {
    document.getElementById('val-init-' + s).textContent = e.target.value;
  });
});

// Payoff sliders — take effect immediately
['win', 'draw', 'loss', 'injury'].forEach(k => {
  document.getElementById('sl-' + k).addEventListener('input', e => {
    payoff[k] = +e.target.value;
    document.getElementById('val-' + k).textContent = e.target.value;
  });
});

// Battle of the Sexes payoff sliders
['B', 'R', 'C'].forEach(k => {
  document.getElementById('sl-' + k).addEventListener('input', e => {
    bosPayoff[k] = +e.target.value;
    document.getElementById('val-' + k).textContent = e.target.value;
  });
});
document.getElementById('sl-mutation').addEventListener('input', e => {
  battleOfSexesMutationRate = +e.target.value / 100;
  document.getElementById('val-mutation').textContent = `${(+e.target.value).toFixed(1)}%`;
});

// Sim type tabs
document.querySelectorAll('.sim-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sim-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    simType = tab.dataset.sim;
    running = false;
    btnPlay.textContent = '▶ Play';
    btnPlay.className   = 'btn primary';

    const isBS = simType === 'bs';
    const isHD = simType === 'hd';

    // Show/hide population extra row
    document.getElementById('pop-row-bs').style.display = isBS ? 'grid' : 'none';

    // Show/hide correct payoff sliders
    document.getElementById('std-payoff-section').style.display  = isBS ? 'none'  : '';
    document.getElementById('bos-payoff-section').style.display  = isBS ? ''      : 'none';
    document.getElementById('payoff-label').textContent = isBS
      ? 'Payoff Parameters' : 'Payoff Values';

    // Update starting-population slider labels
    document.getElementById('lbl-sl-a').textContent = isBS ? '♀ Females' : (isHD ? '🦅 Hawks'     : '🏠 Bourgeois');
    document.getElementById('lbl-sl-b').textContent = isBS ? '♂ Males'   : (isHD ? '🕊️ Doves'    : '⚔️ Intruders');

    initAgents(
      +document.getElementById('sl-init-a').value,
      +document.getElementById('sl-init-b').value
    );
    scene.background.set(PHASE_SKY.fight);
  });
});

// ── Initial boot ──────────────────────────────────────────────
initAgents(50, 50);
scene.background.set(PHASE_SKY.fight);
</script>
